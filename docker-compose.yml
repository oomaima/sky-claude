version: '3.8'

services:
  backend:
    build: ./backend
    container_name: genviz-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-db:/app/data
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    container_name: genviz-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-db:
